<!DOCTYPE html>
<html>
<head>
  <?!= include('estilo'); ?>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</head>
<body class="background">
<div class="container">
  <h4 class="center">Ingreso</h4>
  <form id="loginForm" class="col s12">
    <div class="input-field">
      <input id="email" type="email" required>
      <label for="email">Correo</label>
    </div>
    <div class="input-field">
      <input id="dni" type="text" required>
      <label for="dni">DNI</label>
    </div>
    <div class="center">
      <button class="btn waves-effect" type="submit">Ingresar</button>
    </div>
  </form>
  <div id="msg" class="error-text center"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const email = document.getElementById('email').value;
    const dni = document.getElementById('dni').value;
    google.script.run.withSuccessHandler(handleLogin).login(email, dni);
  });
  function handleLogin(res){
    if(res.error){
      document.getElementById('msg').textContent = res.error;
    }else if(res.html){
      document.open();
      document.write(res.html);
      document.close();
    }
  }
</script>
</body>
</html>
// === End index.html ===
